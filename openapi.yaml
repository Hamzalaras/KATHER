  /poets:
    get:
      operationId: listPoets
      summary: List poets
      description: >-
        Returns a paginated list of poets with optional filtering by era, country,
        gender, and search query. Arabic names are UTF-8 encoded and should be
        rendered RTL. Rate limiting applies to this endpoint.
      tags: [Poets]
      x-rateLimit:
        limit: 100
        windowMs: 900000
        policy: fixed-window
      parameters:
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/LimitPoetsParam"
        - $ref: "#/components/parameters/MetaParam"
        - $ref: "#/components/parameters/EraParam"
        - $ref: "#/components/parameters/CountryParam"
        - $ref: "#/components/parameters/GenderParam"
        - $ref: "#/components/parameters/SearchQueryShortParam"
        - $ref: "#/components/parameters/PoetSortParam"
      responses:
        "200":
          description: Paginated list of poets.
          headers:
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoetListResponse"
              examples:
                poets:
                  value:
                    status: success
                    data:
                      - id: 1
                        engName: Al-Mutanabbi
                        arabName: "المتنبي"
                        engEra: abbasid-era
                        arabEra: "العصر العباسي"
                        engCountry: iraq
                        arabCountry: "العراق"
                        gender: male
                        created_at: "2026-01-01T00:00:00.000Z"
                        poem_count: 128
                    pagination:
                      offset: 0
                      page: 1
                      limit: 50
                      total: 345
                      total_pages: 7
                      has_more: true
                    links:
                      self: /v1/poets?limit=50&offset=0
                      next: /v1/poets?limit=50&offset=50
                      prev: null
                      random: /v1/poets/random
                    meta:
                      filters:
                        era: abbasid-era
                        country: iraq
                        gender: male
                        q: "متنبي"
                        sort: name
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |-
            curl -sS "https://api.example.com/v1/poets?limit=5&offset=0&era=abbasid-era"
        - lang: JavaScript
          label: fetch
          source: |-
            const url = new URL("https://api.example.com/v1/poets");
            url.searchParams.set("limit", "5");
            url.searchParams.set("offset", "0");
            const res = await fetch(url);
            console.log(await res.json());
        - lang: Python
          label: requests
          source: |-
            import requests
            resp = requests.get("https://api.example.com/v1/poets", params={"limit": 5, "offset": 0})
            print(resp.json())

