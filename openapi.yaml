openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

info:
  title: KATHER 
  version: 1.0.0
  description: >-
    KATHER - Arabic Poetry API - serves curated Arabic poetry data, including poets, poems,
    verses, eras, topics, meters, and rhyme schemes. It is designed for developers
    building Arabic literature apps, NLP tools, educational platforms, and cultural
    archives. All Arabic text is UTF-8 encoded and should be displayed right-to-left.
  termsOfService: https://example.com/terms
  contact:
    email: support@example.com
    url: https://example.com/support
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC
  x-logo:
    url: https://example.com/assets/arabic-poetry-logo.png
    backgroundColor: "#ffffff"
    altText: KATHER

servers:
  - url: http://localhost:{port}{basePath}
    description: Local development
    variables:
      port:
        default: "3000"
      basePath:
        default: "/v1"
        enum:
          - ""
          - "/v1"
  - url: https://staging.api.example.com{basePath}
    description: Staging
    variables:
      basePath:
        default: "/v1"
        enum:
          - ""
          - "/v1"
  - url: https://api.example.com{basePath}
    description: Production
    variables:
      basePath:
        default: "/v1"
        enum:
          - ""
          - "/v1"

security: []

tags:
  - name: Health
    description: Liveness and readiness endpoints for monitoring.
  - name: Metrics
    description: Prometheus-compatible metrics for observability.
  - name: Catalog
    description: Catalog endpoints for eras, countries, topics, seas, and quawafi.
  - name: Poets
    description: Poet discovery, profiles, stats, and poet-linked poems.
  - name: Poems
    description: Poem discovery, details, context, and related lines.
  - name: Lines
    description: Individual line discovery and random line retrieval.
  - name: Docs
    description: OpenAPI specification and interactive documentation.

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: >-
        Returns liveness information for the API. This endpoint is unauthenticated
        and is suitable for uptime checks. Arabic text, where present, is UTF-8 encoded
        and should be rendered RTL.
      tags: [Health]
      x-rateLimit:
        limit: 100
        windowMs: 900000
        policy: fixed-window
      responses:
        "200":
          description: Service is healthy.
          headers:
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: healthy
                    service: arabic_poetry_api
                    version: 1.0.0
                    timestamp: "2026-05-07T12:00:00.000Z"
                    uptimeSeconds: 86400
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |-
            curl -sS "https://api.example.com/v1/health"
        - lang: JavaScript
          label: fetch
          source: |-
            const res = await fetch("https://api.example.com/v1/health");
            const data = await res.json();
            console.log(data);
        - lang: Python
          label: requests
          source: |-
            import requests
            print(requests.get("https://api.example.com/v1/health").json())

  /ready:
    get:
      operationId: getReadiness
      summary: Readiness check
      description: >-
        Performs dependency checks for PostgreSQL and Redis. Returns 200 when ready
        and 503 when degraded. Arabic text, where present, is UTF-8 encoded and
        should be rendered RTL.
      tags: [Health]
      x-rateLimit:
        limit: 100
        windowMs: 900000
        policy: fixed-window
      responses:
        "200":
          description: Service is ready.
          headers:
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              examples:
                ready:
                  value:
                    status: ready
                    service: arabic_poetry_api
                    version: 1.0.0
                    timestamp: "2026-05-07T12:01:00.000Z"
                    checks:
                      database:
                        status: ok
                        latencyMs: 8
                      redis:
                        status: ok
                        latencyMs: 2
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |-
            curl -sS "https://api.example.com/v1/ready"
        - lang: JavaScript
          label: fetch
          source: |-
            const res = await fetch("https://api.example.com/v1/ready");
            console.log(await res.json());
        - lang: Python
          label: requests
          source: |-
            import requests
            print(requests.get("https://api.example.com/v1/ready").json())

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: >-
        Returns Prometheus metrics in text format. Basic authentication is enforced
        only when METRICS_BASIC_AUTH_USER and METRICS_BASIC_AUTH_PASSWORD are set.
      tags: [Metrics]
      security:
        - {}
        - basicAuth: []
      x-rateLimit:
        limit: 100
        windowMs: 900000
        policy: fixed-window
      responses:
        "200":
          description: Metrics payload.
          headers:
            Content-Type:
              description: Prometheus text format.
              schema:
                type: string
                example: text/plain; version=0.0.4; charset=utf-8
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            text/plain:
              schema:
                type: string
                description: Prometheus exposition format.
                example: |-
                  # HELP http_requests_total Total number of HTTP requests
                  # TYPE http_requests_total counter
                  http_requests_total{method="GET",route="/poets",status="200"} 42
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |-
            curl -sS -u metrics:password "https://api.example.com/v1/metrics"
        - lang: JavaScript
          label: fetch
          source: |-
            const res = await fetch("https://api.example.com/v1/metrics", {
              headers: { Authorization: "Basic " + btoa("metrics:password") },
            });
            console.log(await res.text());
        - lang: Python
          label: requests
          source: |-
            import requests
            resp = requests.get("https://api.example.com/v1/metrics", auth=("metrics", "password"))
            print(resp.text)

  /catalog:
    get:
      operationId: getCatalog
      summary: Get catalog overview
      description: >-
        Returns all catalog collections (eras, countries, topics, seas, quawafi)
        used for filtering poets, poems, and lines. Arabic labels are UTF-8 encoded
        and should be rendered RTL.
      tags: [Catalog]
      x-rateLimit:
        limit: 100
        windowMs: 900000
        policy: fixed-window
      responses:
        "200":
          description: Catalog collection payload.
          headers:
            Cache-Control:
              description: Cache policy for catalog data.
              schema:
                type: string
                example: public, max-age=86400, stale-while-revalidate=604800
            X-API-Version:
              $ref: "#/components/headers/X-API-Version"
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogCollectionResponse"
              examples:
                catalog:
                  value:
                    status: success
                    data:
                      eras:
                        - id: abbasid-era
                          labelAr: "العصر العباسي"
                          aliases: []
                      countries:
                        - id: iraq
                          labelAr: "العراق"
                          aliases: []
                      quawafi:
                        - id: q-ل
                          labelAr: "قافية اللام (ل)"
                          aliases: []
                      seas:
                        - id: el-tawil
                          labelAr: "الطويل"
                          aliases: []
                      topics:
                        - id: pride
                          labelAr: "قصائد فخر"
                          aliases: []
                    meta:
                      collections: 5
                      counts:
                        eras: 11
                        countries: 21
                        quawafi: 33
                        seas: 40
                        topics: 28
                    links:
                      self: /v1/catalog
                      eras: /v1/catalog/eras
                      countries: /v1/catalog/countries
                      quawafi: /v1/catalog/quawafi
                      seas: /v1/catalog/seas
                      topics: /v1/catalog/topics
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |-
            curl -sS "https://api.example.com/v1/catalog"
        - lang: JavaScript
          label: fetch
          source: |-
            const res = await fetch("https://api.example.com/v1/catalog");
            console.log(await res.json());
        - lang: Python
          label: requests
          source: |-
            import requests
            print(requests.get("https://api.example.com/v1/catalog").json())

