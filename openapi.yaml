components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Basic auth for /metrics when enabled by env vars.

  headers:
    X-API-Version:
      description: Semantic API version.
      schema:
        type: string
        example: 1.0.0
    X-Request-Id:
      description: Unique request correlation ID.
      schema:
        type: string
        example: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Numeric identifier.
      schema:
        type: integer
        minimum: 1
        example: 1
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of records to skip.
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 0
    LimitPoetsParam:
      name: limit
      in: query
      required: false
      description: Maximum number of poets to return (1-50).
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50
        example: 50
    LimitPoetPoemsParam:
      name: limit
      in: query
      required: false
      description: Maximum number of poems to return (1-50).
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50
        example: 50
    LimitPoemsParam:
      name: limit
      in: query
      required: false
      description: Maximum number of poems to return (1-20).
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 20
        example: 20
    LimitPoemLinesParam:
      name: limit
      in: query
      required: false
      description: Maximum number of lines to return (1-20).
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 20
        example: 20
    LimitPoemDetailLinesParam:
      name: limit
      in: query
      required: false
      description: Maximum number of lines to return (1-12).
      schema:
        type: integer
        minimum: 1
        maximum: 12
        default: 12
        example: 12
    LimitLinesParam:
      name: limit
      in: query
      required: false
      description: Maximum number of lines to return (1-50).
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50
        example: 50
    MetaParam:
      name: meta
      in: query
      required: false
      description: Use "full" to force count metadata on search results.
      schema:
        type: string
        enum: [full]
        example: full
    PoetSortParam:
      name: sort
      in: query
      required: false
      description: Sort order for poets.
      schema:
        type: string
        enum: [name, -name, arab_name, -arab_name, created_at, -created_at, id, -id]
        default: name
        example: name
    EraParam:
      name: era
      in: query
      required: false
      description: Era filter (catalog id or alias).
      schema:
        type: string
        example: abbasid-era
    CountryParam:
      name: country
      in: query
      required: false
      description: Country filter (catalog id or alias).
      schema:
        type: string
        example: iraq
    GenderParam:
      name: gender
      in: query
      required: false
      description: Gender filter.
      schema:
        type: string
        enum: [male, female]
        example: male
    QuafiaParam:
      name: quafia
      in: query
      required: false
      description: Rhyme scheme filter.
      schema:
        type: string
        example: q-ل
    SeaParam:
      name: sea
      in: query
      required: false
      description: Meter (sea) filter.
      schema:
        type: string
        example: el-tawil
    TopicParam:
      name: topic
      in: query
      required: false
      description: Topic filter (catalog value).
      schema:
        type: string
        example: Pride
    PoetIdQueryParam:
      name: poetId
      in: query
      required: false
      description: Filter poems or lines by poet id.
      schema:
        type: integer
        minimum: 1
        example: 1
    PoemTypeParam:
      name: type
      in: query
      required: false
      description: Poem type filter (1-120 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 120
        example: classical
    LineTypeParam:
      name: lineType
      in: query
      required: false
      description: Line type filter (1-3).
      schema:
        type: integer
        minimum: 1
        maximum: 3
        example: 1
    SearchQueryShortParam:
      name: q
      in: query
      required: false
      description: Search query (1-120 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 120
        example: "متنبي"
    SearchQueryLongParam:
      name: q
      in: query
      required: false
      description: Search query (1-500 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 500
        example: "الخيل والليل"

  responses:
    BadRequest:
      description: Invalid request parameters.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalid:
              value:
                status: error
                message: "Limit must be between 1 and 50"
                errors:
                  - code: INVALID_LIMIT
                    message: "Limit must be between 1 and 50"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:00.000Z"
    Unauthorized:
      description: Missing or invalid credentials.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthorized:
              value:
                status: error
                message: "Unauthorized"
                errors:
                  - code: UNAUTHORIZED
                    message: "Unauthorized"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:10.000Z"
    Forbidden:
      description: Request is not allowed (e.g., CORS rejected).
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                status: error
                message: "CORS origin not allowed"
                errors:
                  - code: FORBIDDEN
                    message: "CORS origin not allowed"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:20.000Z"
    NotFound:
      description: Resource not found.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                status: error
                message: "Poet not found"
                errors:
                  - code: POET_NOT_FOUND
                    message: "Poet not found"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:30.000Z"
    RateLimitExceeded:
      description: Too many requests.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimit:
              value:
                status: error
                message: "Too many requests"
                errors:
                  - code: RATE_LIMIT_EXCEEDED
                    message: "Too many requests"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:40.000Z"
    InternalServerError:
      description: Unexpected server error.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            serverError:
              value:
                status: error
                message: "Internal server error"
                errors:
                  - code: INTERNAL_SERVER_ERROR
                    message: "Internal server error"
                requestId: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
                timestamp: "2026-05-07T12:02:50.000Z"
    ServiceUnavailable:
      description: Dependency health check failed.
      headers:
        X-API-Version:
          $ref: "#/components/headers/X-API-Version"
        X-Request-Id:
          $ref: "#/components/headers/X-Request-Id"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadinessResponse"
          examples:
            degraded:
              value:
                status: degraded
                service: arabic_poetry_api
                version: 1.0.0
                timestamp: "2026-05-07T12:03:00.000Z"
                checks:
                  database:
                    status: down
                    error: "timeout"
                  redis:
                    status: ok
                    latencyMs: 2

  schemas:
    HealthResponse:
      type: object
      description: Liveness response payload.
      properties:
        status:
          type: string
          description: Health status.
          example: healthy
        service:
          type: string
          description: Service name.
          example: arabic_poetry_api
        version:
          type: string
          description: Service version.
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp when the response was generated.
          example: "2026-05-07T12:00:00.000Z"
        uptimeSeconds:
          type: integer
          description: Service uptime in seconds.
          example: 86400
      required: [status, service, version, timestamp, uptimeSeconds]

    ReadinessResponse:
      type: object
      description: Readiness response payload.
      properties:
        status:
          type: string
          description: Readiness status.
          example: ready
        service:
          type: string
          description: Service name.
          example: arabic_poetry_api
        version:
          type: string
          description: Service version.
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp when the response was generated.
          example: "2026-05-07T12:01:00.000Z"
        checks:
          $ref: "#/components/schemas/ReadinessChecks"
      required: [status, service, version, timestamp, checks]

    ReadinessChecks:
      type: object
      description: Dependency check results.
      properties:
        database:
          $ref: "#/components/schemas/ReadinessCheck"
        redis:
          $ref: "#/components/schemas/ReadinessCheck"
      required: [database, redis]

    ReadinessCheck:
      type: object
      description: Individual dependency check.
      properties:
        status:
          type: string
          description: Dependency status.
          example: ok
        latencyMs:
          type: [integer, "null"]
          description: Latency in milliseconds when healthy.
          example: 4
        error:
          type: [string, "null"]
          description: Error message when unhealthy.
          example: timeout
      required: [status]

    ErrorDetail:
      type: object
      description: Error detail entry.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: INVALID_LIMIT
        message:
          type: string
          description: Human-readable error message.
          example: "Limit must be between 1 and 50"
      required: [code, message]

    ErrorResponse:
      type: object
      description: Standard error response.
      properties:
        status:
          type: string
          description: Response status.
          example: error
        message:
          type: string
          description: Summary error message.
          example: "Limit must be between 1 and 50"
        errors:
          type: array
          description: Detailed error list.
          items:
            $ref: "#/components/schemas/ErrorDetail"
          example:
            - code: INVALID_LIMIT
              message: "Limit must be between 1 and 50"
        requestId:
          type: [string, "null"]
          description: Request correlation ID.
          example: "01HZX8JQG5T4XK3BPCQ1V6Y9AE"
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp of the error.
          example: "2026-05-07T12:02:00.000Z"
      required: [status, message, errors, requestId, timestamp]

    Pagination:
      type: object
      description: Offset-based pagination metadata.
      properties:
        offset:
          type: integer
          description: Offset used for the current page.
          example: 0
        page:
          type: integer
          description: Current page number.
          example: 1
        limit:
          type: integer
          description: Page size limit.
          example: 20
        total:
          type: [integer, "null"]
          description: Total number of items when counted.
          example: 540
        total_pages:
          type: [integer, "null"]
          description: Total number of pages when counted.
